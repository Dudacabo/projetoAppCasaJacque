{% extends 'base.html' %}

{% block title %}Cadastrar Produto{% endblock %}

{% block content %}

<div class="card shadow p-4">
        <div style="text-align: center;">
            <h2 class="mb-3">➕ Cadastrar Produto</h2>
        </div>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="submit" class="btn btn-primary">
            Salvar
        </button>

        <a href="{% url 'pedidos:listar_produto' %}" class="btn btn-secondary">
            Cancelar
        </a>
    </form>
</div>

{% endblock %}
