{% extends 'base.html' %}

{% block title %}Editar Produto{% endblock %}

{% block content %}

<div class="card shadow p-4">
        <div style="text-align: center;">
            <h2 class="mb-3">✏️ Editar Produto</h2>
        </div>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
            <div style="text-align: center;">
                <button type="submit" class="btn btn-gold">
                    Salvar Alterações
                </button>

                <a href="{% url 'pedidos:listar_produto' %}" class="btn btn-secondary">
                    Cancelar
                </a>
            </div>
    </form>
</div>

{% endblock %}
