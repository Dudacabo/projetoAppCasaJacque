{% extends 'base.html' %}

{% block title %}Adicionar Item{% endblock %}

{% block content %}

<div class="card shadow p-4">

    <h2>Adicionar Produto ao Pedido de {{ pedido.cliente_nome }}</h2>

    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        
        <div style="text-align: center;">
            <button type="submit" class="btn btn-gold">
                Salvar
            </button>

            <a href="{% url 'pedidos:detalhar_pedido' pedido.id %}" class="btn btn-secondary">
                Voltar
            </a>
        </div>
    </form>

</div>

{% endblock %}
