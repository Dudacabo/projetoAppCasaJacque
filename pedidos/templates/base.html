<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sistema{% endblock %}</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">

        <!-- Nome do sistema -->
        <a class="navbar-brand fw-bold" href="#">
            📦 Sistema
        </a>

        <!-- Botão Mobile -->
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <!-- Links -->
        <div class="collapse navbar-collapse justify-content-center" id="navbarNav">
            <ul class="navbar-nav">

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'pedidos:home' %}">
                        🏠 Home
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'pedidos:listar_pedido' %}">
                        📄 Pedidos
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'pedidos:listar_produto' %}">
                        🛒 Produtos
                    </a>
                </li>

            </ul>
        </div>

    </div>
</nav>

<!-- CONTEÚDO CENTRALIZADO -->
<div class="container d-flex justify-content-center">
    <div class="col-12 col-md-8 col-lg-6">
        {% block content %}
        {% endblock %}
    </div>
</div>

<!-- Bootstrap JS (necessário para menu mobile funcionar) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
