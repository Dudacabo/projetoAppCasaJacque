{% extends 'base.html' %}

{% block title %}Cadastrar Pedido{% endblock %}

{% block content %}
    <div style="text-align: center;">
        <h2 class="mb-3">➕ Cadastrar Pedido</h2>
    </div>
<div class="card p-4 shadow-sm">
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <div style="text-align: center;">
            <button type="submit" class="btn btn-primary">
                Salvar
            </button>

            <a href="{% url 'pedidos:listar_pedido' %}" class="btn btn-secondary">
                Cancelar
            </a>
        </div>
    </form>
</div>

{% endblock %}
